name: Follow-up cron

# Dispara o endpoint /api/ai/followup-cron a cada 5 minutos.
# Substitui o Vercel Cron (bloqueado em Hobby plan — só permite 1x/dia).
#
# Requer os seguintes secrets no GitHub:
#   - APP_URL: base URL do deploy (ex: https://agente-ia-chi.vercel.app)
#   - CRON_SECRET: mesmo valor que a env var CRON_SECRET no Vercel
#
# Adiciona em: Settings → Secrets and variables → Actions → New repository secret

on:
  schedule:
    - cron: '*/5 * * * *'
  workflow_dispatch: {}

jobs:
  ping:
    runs-on: ubuntu-latest
    timeout-minutes: 3
    steps:
      - name: Call follow-up cron endpoint
        run: |
          curl -sS -X POST \
            -H "Authorization: Bearer ${{ secrets.CRON_SECRET }}" \
            -H "Content-Type: application/json" \
            --max-time 120 \
            "${{ secrets.APP_URL }}/api/ai/followup-cron" \
            -o /tmp/cron-response.json \
            -w "HTTP %{http_code} in %{time_total}s\n"
          echo '--- response body ---'
          cat /tmp/cron-response.json || true
